# Sidecar is intentionally absent for unattended Docker.
# - landReady, failedCiNoFix, dagStaleReady rules are absorbed into the engine's automation runner.
# - stuckWaitingInput and uncommittedCompleted remain sidecar-only and are local-dev observers.
# - The doctor `sidecar-status` check returning `degraded` (no pidfile) is intentional in unattended mode.
#
# For the unattended overnight checklist see docs/deploy/supervisor.md.
# Single-container deploy: engine serves /api + the built PWA on /.
#
# First-time setup on the mini PC:
#   git clone https://github.com/tprei/claude-minions.git ~/claude-minions
#   cd ~/claude-minions
#   cp .env.local.example .env.deploy
#   # edit .env.deploy: set MINIONS_TOKEN, the GH App vars (MINIONS_GH_APP_*),
#   # set MINIONS_GH_APP_PRIVATE_KEY=/secrets/gh-app.pem.
#   # Optional: set CLOUDFLARE_TUNNEL_TOKEN=... to enable the named tunnel.
#   ln -sf .env.deploy .env   # compose reads ${VAR} from .env at parse time
#   mkdir -p ./secrets ./data
#   cp /path/to/your/.minions-gh-app.pem ./secrets/gh-app.pem
#   docker run --rm -v ./data:/data -v ./secrets:/secrets alpine chown -R 10001:10001 /data /secrets
#   docker compose up -d --build               # engine only
#   docker compose --profile tunnel up -d      # engine + cloudflared tunnel
#
# Claude credentials live in /data/home/.claude inside the container, which
# bind-mounts to ./data/home/.claude on the host. Run `claude /login` once
# inside the container after first boot:
#   docker exec -it minions claude /login
#
# Update:
#   git pull && docker compose --profile tunnel up -d --build
#
# The web UI is served from the same port; visit http://<host>:8787/ and
# add a connection in the picker pointing back with your MINIONS_TOKEN.

services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: minions/engine:local
    container_name: minions
    restart: unless-stopped
    env_file:
      - .env.deploy
    environment:
      MINIONS_HOST: 0.0.0.0
      MINIONS_PORT: 8787
      MINIONS_WORKSPACE: /data/workspace
      MINIONS_SERVE_WEB: "true"
      MINIONS_WEB_DIST: /app/packages/web/dist
      HOME: /data/home
    ports:
      - "8787:8787"
    volumes:
      - ./data:/data
      - ./secrets:/secrets:ro
    healthcheck:
      test: ["CMD","node","-e","require('http').get('http://127.0.0.1:8787/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Named Cloudflare tunnel — opt-in via `--profile tunnel`.
  # Set CLOUDFLARE_TUNNEL_TOKEN in .env.deploy after creating the tunnel at
  # https://one.dash.cloudflare.com/ → Networks → Tunnels. Point its public
  # hostname at http://engine:8787 (the docker network alias, not localhost).
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      engine:
        condition: service_healthy
